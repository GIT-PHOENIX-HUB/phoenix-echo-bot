name: Phoenix Echo Bot CI

on:
  push:
    branches: ["main", "master", "claude/*"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Health check smoke test
        run: |
          timeout 10 node src/index.js &
          SERVER_PID=$!
          sleep 3
          curl -sf http://127.0.0.1:18790/health || echo "Health check skipped (no auth token configured)"
          kill $SERVER_PID 2>/dev/null || true
        env:
          PHOENIX_BIND: "127.0.0.1"
          PHOENIX_PORT: "18790"
          ANTHROPIC_AUTH_TOKEN: "test-token-ci"
        continue-on-error: true
